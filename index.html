<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>伞韵·共创 - 数字化非遗活态传承</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #F5F3EF;
            --primary-color: #9D0A0A;
            --primary-light: rgba(157, 10, 10, 0.1);
            --text-black: #1A1A1A;
            --text-gray: #666666;
            --border-gray: #E0E0E0;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-black);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 页面容器管理 */
        .page {
            display: none;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 首页样式 */
        .header {
            text-align: center;
            padding: 40px 0;
        }

        .title {
            font-size: 28px;
            color: var(--primary-color);
            letter-spacing: 4px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-gray);
            letter-spacing: 2px;
        }

        .input-section {
            background: var(--white);
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 20px;
        }

        .input-label {
            font-size: 16px;
            margin-bottom: 15px;
            display: block;
            color: var(--text-black);
            font-weight: 500;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 1px solid var(--border-gray);
            border-radius: 12px;
            resize: none;
            font-size: 15px;
            line-height: 1.6;
            background-color: #fafafa;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn-generate {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }

        /* 结果页样式 */
        .canvas-container {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }

        canvas {
            background: transparent;
            max-width: 100%;
            height: auto;
        }

        .action-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-secondary {
            padding: 14px;
            background: var(--white);
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
            cursor: pointer;
        }

        /* 加载状态 */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(245, 243, 239, 0.9);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--primary-light);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            color: var(--primary-color);
            font-size: 14px;
            letter-spacing: 1px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
            z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="indexPage" class="page active">
        <div class="header">
            <h1 class="title">伞韵·共创</h1>
            <p class="subtitle">数字化非遗活态传承</p>
        </div>
        
        <div class="input-section">
            <label class="input-label">请描述您心中的油纸伞意境：</label>
            <textarea id="promptInput" placeholder="例如：烟雨江南的青石板路，淡雅的桃花与流水..."></textarea>
            <button class="btn-generate" onclick="handleGenerate()">唤醒灵感</button>
        </div>
    </div>

    <div id="resultPage" class="page">
        <div class="header">
            <h2 class="title">共创结果</h2>
            <p class="subtitle">您的专属非遗伞面已铺展</p>
        </div>

        <div class="canvas-container">
            <canvas id="umbrellaCanvas"></canvas>
        </div>

        <div class="action-group">
            <button class="btn-secondary" onclick="restart()">重新唤醒</button>
            <button class="btn-generate" onclick="downloadResult()">保存作品</button>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <p class="loading-text" id="loadingMsg">正在铺展卷轴...</p>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let generatedImage = '';

        // 统一接口调用
        async function generateWithDoubaoAPI(prompt) {
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || '后端服务异常');
                }

                const data = await response.json();
                if (data.success && data.url) {
                    return data.url;
                } else {
                    throw new Error('生成数据格式有误');
                }
            } catch (error) {
                console.error("生成出错:", error);
                throw error;
            }
        }

        // 处理生成逻辑
        async function handleGenerate() {
            const prompt = document.getElementById('promptInput').value.trim();
            if (!prompt) return showToast('请输入描述文字');

            showLoading('正在绘制伞面，约需10秒...');
            
            try {
                generatedImage = await generateWithDoubaoAPI(prompt);
                await processAndDisplay();
            } catch (error) {
                showToast(error.message);
                hideLoading();
            }
        }

        // 处理并显示图片到 Canvas
        async function processAndDisplay() {
            if (!generatedImage) return;
            const canvas = document.getElementById('umbrellaCanvas');
            const ctx = canvas.getContext('2d');
            
            const size = Math.min(window.innerWidth - 80, 320);
            canvas.width = size * 2;
            canvas.height = size * 2;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';

            const centerX = size;
            const centerY = size;
            const radius = size - 10;

            const img = new Image();
            // 先设置跨域属性，再给 src 赋值
            img.setAttribute('crossOrigin', 'anonymous'); 
            
            try {
                await new Promise((resolve, reject) => {
                    img.onload = resolve;
                    img.onerror = () => reject(new Error("图片加载失败"));
                    // 加时间戳防止浏览器缓存导致的 CORS 报错
                    img.src = generatedImage + (generatedImage.includes('?') ? '&' : '?') + 't=' + new Date().getTime();
                });

                ctx.save();
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.closePath();
                ctx.clip();

                const imgSize = Math.max(img.width, img.height);
                const scale = (radius * 2) / imgSize;
                const drawWidth = img.width * scale;
                const drawHeight = img.height * scale;
                const drawX = centerX - drawWidth / 2;
                const drawY = centerY - drawHeight / 2;
                
                ctx.drawImage(img, drawX, drawY, drawWidth, drawHeight);
                ctx.restore();

                // 绘制伞骨
                drawUmbrellaRibs(ctx, centerX, centerY, radius);

                // 外圈装饰
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(157, 10, 10, 0.3)';
                ctx.lineWidth = 3;
                ctx.stroke();

                hideLoading();
                goToPage('resultPage');
            } catch (e) {
                showToast("处理图片出错，请重试");
                hideLoading();
            }
        }

        function drawUmbrellaRibs(ctx, x, y, r) {
            ctx.save();
            ctx.strokeStyle = 'rgba(0,0,0,0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 24; i++) {
                ctx.beginPath();
                ctx.moveTo(x, y);
                const angle = (i * 15 * Math.PI) / 180;
                ctx.lineTo(x + r * Math.cos(angle), y + r * Math.sin(angle));
                ctx.stroke();
            }
            ctx.restore();
        }

        // 工具函数
        function goToPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0,0);
        }

        function restart() {
            generatedImage = '';
            document.getElementById('promptInput').value = '';
            goToPage('indexPage');
        }

        function downloadResult() {
            const canvas = document.getElementById('umbrellaCanvas');
            const link = document.createElement('a');
            link.download = '伞韵共创-作品.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function showLoading(msg) {
            document.getElementById('loadingMsg').innerText = msg;
            document.getElementById('loadingOverlay').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
