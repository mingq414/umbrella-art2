<!DOCTYPE html>
<html lang="zh-CN">
<body>
    <script>
        // 全局变量
        let generatedImage = null;
        let currentPrompt = '';

        // 页面导航 [cite: 102-107]
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
        function goToHome() { showPage('homePage'); }
        function goToInputPage() { showPage('inputPage'); }
        function goToLoadingPage() { showPage('loadingPage'); }
        function goToResultPage() { showPage('resultPage'); }
        function setPrompt(text) { document.getElementById('promptInput').value = text; }

        // Toast提示 [cite: 108-109]
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // --- 核心修改部分：请求 Vercel 后端接口 ---
        async function generateWithDoubaoAPI(prompt) {
            // 注意：这里请求的是你自己写的 Vercel Serverless Function
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });
            
            const data = await response.json();
            
            if (response.ok && data.success) {
                return data.url;
            } else {
                throw new Error(data.error || '生成失败，请检查模型 ID 或余额');
            }
        }

        // 开始生成逻辑 [cite: 123-128]
        async function startGeneration() {
            const prompt = document.getElementById('promptInput').value.trim();
            if (!prompt) {
                showToast('请输入您的创作意象');
                return;
            }

            currentPrompt = prompt;
            document.getElementById('artworkName').value = `《${prompt}》`;
            document.getElementById('generateBtn').disabled = true;
            
            goToLoadingPage();

            try {
                const imageUrl = await generateWithDoubaoAPI(prompt);
                generatedImage = imageUrl;
                await processAndDisplay();
            } catch (error) {
                console.error('生成失败:', error);
                showToast(`生成失败: ${error.message}`);
                goToInputPage();
            }
            document.getElementById('generateBtn').disabled = false;
        }

        // 处理并显示图片（将方形图裁剪成圆伞）
        async function processAndDisplay() {
            if (!generatedImage) return;
            const canvas = document.getElementById('umbrellaCanvas');
            const ctx = canvas.getContext('2d');
            
            const size = Math.min(window.innerWidth - 80, 320);
            canvas.width = size * 2;
            canvas.height = size * 2;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';

            const centerX = size;
            const centerY = size;
            const radius = size - 10;

            const img = new Image();
            img.crossOrigin = 'anonymous'; // 解决跨域画布污染
            await new Promise((resolve, reject) => {
                img.onload = resolve;
                img.onerror = reject;
                img.src = generatedImage;
            });

            ctx.save();
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.clip(); // 核心：裁剪成圆形 [cite: 133]

            const imgSize = Math.min(img.width, img.height);
            const scale = (radius * 2) / imgSize;
            const drawWidth = img.width * scale;
            const drawHeight = img.height * scale;
            ctx.drawImage(img, centerX - drawWidth/2, centerY - drawHeight/2, drawWidth, drawHeight);
            ctx.restore();

            drawUmbrellaRibs(ctx, centerX, centerY, radius); // 绘制伞骨纹理 [cite: 139]
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(157, 10, 10, 0.3)';
            ctx.lineWidth = 3;
            ctx.stroke();

            goToResultPage();
        }

        // ... 此处省略原有的 drawUmbrellaRibs, saveImage, shareArtwork 等函数，保持不变 [cite: 139-157] ...
    </script>
</body>
</html>
